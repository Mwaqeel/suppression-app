<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Suppression Checker</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="wrap">
    <h1>Suppression Checker</h1>

    <div class="card" id="loginCard">
      <input id="password" type="password" placeholder="Password"/>
      <button id="loginBtn">Login</button>
      <div class="muted" id="loginMsg"></div>
    </div>

    <div class="card hidden" id="appCard">
      <div class="row">
        <div class="badge" id="roleBadge"></div>
        <button class="ghost" id="logoutBtn">Logout</button>
      </div>

      <div id="adminBlock" class="hidden">
        <h3>Admin: Seed Master Suppression IDs</h3>
        <textarea id="adminIds" placeholder="Paste IDs (one per line)"></textarea>
        <button id="seedBtn">Upload to DB</button>
        <div class="muted" id="seedMsg"></div>
        <hr/>
      </div>

      <h3>User: Upload IDs File</h3>
      <input id="file" type="file" accept=".txt,.csv"/>
      <div class="row">
        <button id="uploadBtn">Upload</button>
        <button id="checkBtn" class="hidden">Check</button>
        <a id="downloadLink" class="hidden" href="#">Download Result CSV</a>
      </div>
      <div class="muted" id="statusMsg"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
